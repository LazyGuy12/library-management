<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sách mới - HUTECH Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Thêm Sách Vào Thư Viện</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/add-book}" th:object="${book}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="title" class="form-label">Tên sách</label>
                            <input type="text" id="title" th:field="*{title}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="isbn" class="form-label">Mã ISBN (Mã vạch)</label>
                            <input type="text" id="isbn" th:field="*{isbn}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="author" class="form-label">Tác giả</label>
                            <input type="text" id="author" th:field="*{author}" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="quantity" class="form-label">Số lượng nhập kho</label>
                            <input type="number" id="quantity" th:field="*{quantity}" class="form-control" min="1" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label">Thể loại</label>
                        <select id="category" th:field="*{category}" class="form-select">
                            <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                            <option value="Kinh tế">Kinh tế</option>
                            <option value="Ngoại ngữ">Ngoại ngữ</option>
                            <option value="Kỹ năng mềm">Kỹ năng mềm</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/admin/books" class="btn btn-secondary">Quay lại danh sách</a>
                        <button type="submit" class="btn btn-success">Lưu vào hệ thống</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
