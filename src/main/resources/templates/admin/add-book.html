<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sách - Ngu Quy Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .btn.disabled {
            pointer-events: none;
            opacity: 0.65;
        }
        .reader-card-sidebar { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 15px;
        }
        .offcanvas-body::-webkit-scrollbar { width: 5px; }
        .offcanvas-body::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 10px; }
    </style>
</head>
<body class="bg-light">
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm" th:replace="~{fragments/header :: navbar}"></nav>
    
    <!-- Sidebar -->
    <div th:replace="~{fragments/header :: sidebar}"></div>
    <div class="container mt-5">
        <!-- Thông báo thành công thêm/sửa sách -->
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show shadow-sm">
            ✅ Thao tác dữ liệu thành công!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Thông báo thành công mượn sách (Flash Attribute) -->
        <div th:if="${borrowSuccess}" class="alert alert-success alert-dismissible fade show shadow-sm">
            <strong>Mượn sách thành công!</strong><br/>
            <span th:text="${borrowSuccess}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Thông báo lỗi mượn sách (Flash Attribute) -->
        <div th:if="${borrowError}" class="alert alert-danger alert-dismissible fade show shadow-sm">
            <strong>Không thể mượn sách!</strong><br/>
            <span th:text="${borrowError}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0" th:text="${book.id == null ? 'Thêm Sách Vào Thư Viện' : 'Cập Nhật Sách: ' + book.title}"></h3>
                <div class="d-flex gap-2">
                    <a th:if="${book.id != null}" href="/admin/add-book" class="btn btn-sm btn-light text-primary fw-bold">Hủy sửa & Thêm mới</a>
                    <a href="/admin/borrow-history" class="btn btn-sm btn-warning text-dark fw-bold">
                        <i class="bi bi-clock-history me-1"></i>Lịch Sử Mượn
                    </a>
                </div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/add-book}" th:object="${book}" method="post" enctype="multipart/form-data">
                    
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{imageUrl}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tên sách</label>
                            <input type="text" th:field="*{title}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mã ISBN</label>
                            <input type="text" th:field="*{isbn}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tác giả</label>
                            <input type="text" th:field="*{author}" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Số lượng</label>
                            <input type="number" th:field="*{quantity}" class="form-control" min="0" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Thể loại</label>
                        <select th:field="*{category}" class="form-select">
                            <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                            <option value="Kinh tế">Kinh tế</option>
                            <option value="Ngoại ngữ">Ngoại ngữ</option>
                            <option value="Kỹ năng mềm">Kỹ năng mềm</option>
                            <option value="Văn học">Văn học</option>
                            <option value="Khoa học">Khoa học</option>
                            <option value="Nghệ thuật">Nghệ thuật</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Hình ảnh bìa sách</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                        <div th:if="${book.imageUrl != null}" class="mt-2 text-muted small">
                            Ảnh hiện tại: <span th:text="${book.imageUrl}"></span>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-secondary">Về trang chủ</a>
                        <button type="submit" class="btn btn-success" 
                                th:text="${book.id == null ? 'Lưu vào hệ thống' : 'Cập nhật thay đổi'}"></button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow mt-5 mb-5">
            <div class="card-header bg-dark text-white">
                <h3 class="mb-0">Danh Sách Sách Trong Kho</h3>
            </div>
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Ảnh</th>
                            <th>Tên sách</th>
                            <th>Tác giả</th>
                            <th>ISBN</th>
                            <th>Số lượng</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${books}">
                            <td>
                                <img th:src="${b.imageUrl != null ? b.imageUrl : 'https://via.placeholder.com/50'}" 
                                     style="width: 50px; height: 70px; object-fit: cover;" class="rounded shadow-sm">
                            </td>
                            <td th:text="${b.title}" class="fw-bold"></td>
                            <td th:text="${b.author}"></td>
                            <td th:text="${b.isbn}"></td>
                            <td>
                                <span th:class="${b.quantity > 0 ? 'badge bg-success' : 'badge bg-danger'}" 
                                      th:text="${b.quantity}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/edit-book/{id}(id=${b.id})}" class="btn btn-sm btn-warning">Sửa</a>
                                    <a th:href="@{/admin/delete-book/{id}(id=${b.id})}" 
                                       class="btn btn-sm btn-danger" 
                                       onclick="return confirm('Xác nhận xóa cuốn sách này?')">Xóa</a>
                                    
                                    <a th:if="${b.status == null or b.status == 'AVAILABLE'}" th:href="@{/admin/borrow-form/{id}(id=${b.id})}" class="btn btn-sm btn-success text-white" title="Mượn sách">
                                        <i class="bi bi-bookmark-plus me-1"></i>Mượn
                                    </a>
                                    <span th:if="${b.status != null and b.status != 'AVAILABLE'}" class="btn btn-sm btn-secondary disabled" title="Sách này hiện không có sẵn">
                                        <i class="bi bi-bookmark-plus me-1"></i>Mượn
                                    </span>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(books)}">
                            <td colspan="6" class="text-center py-4 text-muted">Thư viện hiện chưa có sách nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
