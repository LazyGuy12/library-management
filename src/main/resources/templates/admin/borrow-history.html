<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Mượn Sách - Ngu Quy Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .loan-status-active { background-color: #fff3cd; }
        .loan-status-returned { background-color: #d4edda; }
        .badge-active { background-color: #ffc107; color: #000; }
        .badge-returned { background-color: #28a745; }
        .reader-card-sidebar { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 15px;
        }
        .offcanvas-body::-webkit-scrollbar { width: 5px; }
        .offcanvas-body::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 10px; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; min-height: 100vh; }
    </style>
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm" th:replace="~{fragments/header :: navbar}"></nav>
    
    <!-- Sidebar -->
    <div th:replace="~{fragments/header :: sidebar}"></div>
    <div class="container-fluid mt-5" style="padding-left: 20px; padding-right: 20px;">
        
        <!-- Thông báo -->
        <div th:if="${borrowSuccess}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4">
            <strong><i class="bi bi-check-circle me-2"></i>Mượn Sách Thành Công!</strong>
            <span th:text="${borrowSuccess}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${borrowError}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4">
            <strong><i class="bi bi-exclamation-circle me-2"></i>Lỗi!</strong>
            <span th:text="${borrowError}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">
                    <i class="bi bi-clock-history me-2"></i>Lịch Sử Mượn Sách
                </h3>
                <a href="/admin/add-book" class="btn btn-sm btn-light">
                    <i class="bi bi-arrow-left me-1"></i>Quay Lại
                </a>
            </div>
            <div class="card-body p-0">
                
                <div th:if="${#lists.isEmpty(loans)}" class="alert alert-info m-4">
                    <i class="bi bi-info-circle me-2"></i>Hiện chưa có giao dịch mượn sách nào.
                </div>

                <div th:if="${not #lists.isEmpty(loans)}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th>Thẻ Độc Giả</th>
                                <th>Tên Độc Giả</th>
                                <th>Tên Sách</th>
                                <th>Mã Sách</th>
                                <th>Ngày Đặt Lịch</th>
                                <th>Ngày Mượn</th>
                                <th>Hạn Trả</th>
                                <th class="text-center">Trạng Thái</th>
                                <th class="text-center">Hành Động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="loan : ${loans}" th:classappend="${loan.status == 'PENDING' ? 'table-warning' : (loan.status == 'PICKED_UP' ? '' : 'table-light')}">
                                <td>
                                    <code th:text="${loan.readerCardId}"></code>
                                </td>
                                <td class="fw-bold">
                                    <span th:text="${loan.readerName}"></span>
                                </td>
                                <td>
                                    <span th:text="${loan.bookTitle}"></span>
                                </td>
                                <td>
                                    <code th:text="${loan.bookCode}"></code>
                                </td>
                                <td>
                                    <i class="bi bi-calendar2 me-1"></i>
                                    <span th:text="${#temporals.format(loan.appointmentTime, 'dd/MM/yyyy HH:mm')}"></span>
                                </td>
                                <td>
                                    <span th:if="${loan.borrowDate != null}">
                                        <i class="bi bi-calendar me-1"></i>
                                        <span th:text="${#temporals.format(loan.borrowDate, 'dd/MM/yyyy')}"></span>
                                    </span>
                                    <span th:if="${loan.borrowDate == null}" class="text-muted fst-italic">Chưa nhận</span>
                                </td>
                                <td>
                                    <i class="bi bi-calendar-check me-1"></i>
                                    <span th:text="${#temporals.format(loan.dueDate, 'dd/MM/yyyy')}"></span>
                                </td>
                                <td class="text-center">
                                    <span th:if="${loan.status == 'PENDING'}" class="badge bg-warning text-dark">
                                        <i class="bi bi-hourglass-split me-1"></i>Chờ Nhận
                                    </span>
                                    <span th:if="${loan.status == 'PICKED_UP'}" class="badge bg-info text-white">
                                        <i class="bi bi-book me-1"></i>Đang Mượn
                                    </span>
                                    <span th:if="${loan.status == 'RETURNED'}" class="badge bg-success">
                                        <i class="bi bi-check-circle me-1"></i>Đã Trả
                                    </span>
                                    <span th:if="${loan.status == 'CANCELLED'}" class="badge bg-danger">
                                        <i class="bi bi-x-circle me-1"></i>Đã Hủy
                                    </span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <a th:if="${loan.status == 'PENDING'}" 
                                           th:href="@{/admin/{loanId}/pickup(loanId=${loan.loanId})}"
                                           class="btn btn-success"
                                           title="Xác nhận lấy sách"
                                           onclick="return confirm('Xác nhận khách hàng đã lấy sách?')">
                                            <i class="bi bi-check2"></i> Nhận
                                        </a>
                                        <button th:if="${loan.status == 'PENDING'}" 
                                               type="button"
                                               class="btn btn-danger"
                                               data-bs-toggle="modal"
                                               th:data-bs-target="'#cancelModal-' + ${loan.loanId}"
                                               title="Hủy đặt lịch">
                                            <i class="bi bi-x-lg"></i> Hủy
                                        </button>
                                        <a th:if="${loan.status == 'PICKED_UP'}" 
                                           th:href="@{/admin/{loanId}/return(loanId=${loan.loanId})}"
                                           class="btn btn-warning"
                                           title="Trả sách"
                                           onclick="return confirm('Xác nhận khách hàng trả sách?')">
                                            <i class="bi bi-arrow-counterclockwise"></i> Trả
                                        </a>
                                        <a th:href="@{/admin/borrow-detail/{loanId}(loanId=${loan.loanId})}"
                                           class="btn btn-info"
                                           title="Xem chi tiết">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                    </div>

                                    <!-- Modal hủy đặt lịch -->
                                    <div class="modal fade" th:id="'cancelModal-' + ${loan.loanId}" tabindex="-1">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header bg-danger text-white">
                                                    <h5 class="modal-title">Hủy Đặt Lịch Mượn</h5>
                                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                                </div>
                                                <form th:action="@{/admin/{loanId}/cancel(loanId=${loan.loanId})}" method="post">
                                                    <div class="modal-body">
                                                        <p class="mb-3">
                                                            <strong>Sách:</strong> <span th:text="${loan.bookTitle}"></span><br>
                                                            <strong>Độc giả:</strong> <span th:text="${loan.readerName}"></span>
                                                        </p>
                                                        <div class="mb-0">
                                                            <label class="form-label fw-bold">Lý do hủy:</label>
                                                            <textarea name="cancelReason" class="form-control" rows="3" required 
                                                                      placeholder="Nhập lý do hủy (vd: User trễ giờ, Sách hỏng, etc...)"></textarea>
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                                                        <button type="submit" class="btn btn-danger">Xác Nhận Hủy</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
