<!-- Header Fragment - reusable across all pages -->
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Navigation Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm" th:fragment="navbar">
        <div class="container">
            <button class="btn btn-primary me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mainSidebar" sec:authorize="isAuthenticated()">
                <i class="bi bi-list fs-4"></i>
            </button>

            <a class="navbar-brand fw-bold" href="/">NGU QUY LIBRARY</a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- Notifications Bell (User only) -->
                    <li class="nav-item" sec:authorize="hasRole('USER')">
                        <a class="nav-link text-white fw-bold position-relative" href="/user/notifications" title="Thông báo">
                            <i class="bi bi-bell fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" 
                                  th:if="${notificationCount != null && notificationCount > 0}"
                                  th:text="${notificationCount}">
                                0
                            </span>
                        </a>
                    </li>
                    
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle text-white fw-bold" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i> <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar (Offcanvas) -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mainSidebar" aria-labelledby="mainSidebarLabel" th:fragment="sidebar">
        <div class="offcanvas-header bg-primary text-white">
            <h5 class="offcanvas-title fw-bold" id="mainSidebarLabel">
                <i class="bi bi-person-bounding-box me-2"></i>TRUNG TÂM CÁ NHÂN
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            
            <div class="list-group list-group-flush" sec:authorize="hasRole('ADMIN')">
                <div class="px-3 py-2 bg-light text-muted small fw-bold text-uppercase">Chế độ Quản trị</div>
                <a th:href="@{/admin/add-book}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-book me-2 text-primary"></i> Quản lý sách
                </a>
                <a th:href="@{/admin/borrow-history}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-journal-check me-2 text-success"></i> Lịch sử mượn sách
                </a>
                <a th:href="@{/admin/cards}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-credit-card me-2 text-warning"></i> Quản lý thẻ độc giả
                </a>
            </div>

            <div sec:authorize="hasRole('USER')">
                <div class="p-3">
                    <div class="card reader-card-sidebar shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h6 class="text-uppercase mb-1 opacity-75 small">Library Card</h6>
                                    <h5 class="fw-bold mb-0" th:text="${user.fullName}">KHIEM NGUYEN</h5>
                                </div>
                                <i class="bi bi-qr-code fs-2"></i>
                            </div>
                            <div class="bg-white bg-opacity-25 p-2 rounded mb-3 text-center">
                                <small class="d-block opacity-75 small">CARD ID</small>
                                <span class="fw-bold" th:text="${user.idCard}">LIB-2026-XXXX</span>
                            </div>
                            <div class="row small g-0">
                                <div class="col-6">
                                    <span class="opacity-75 d-block">MSSV</span>
                                    <span class="fw-bold" th:text="${user.mssv}">210xxx</span>
                                </div>
                                <div class="col-6 text-end">
                                    <span class="opacity-75 d-block">HẠN DÙNG</span>
                                    <span class="fw-bold" th:text="${user.expiryDate}">01/01/2027</span>
                                </div>
                            </div>
                            <hr class="my-2 bg-white">
                            <div class="text-center small">
                                <span th:class="${user.status == 'ACTIVE' ? 'text-info' : 'text-danger'}" 
                                      th:text="${user.status == 'ACTIVE' ? '● Đang hoạt động' : '● Bị khóa'}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="list-group list-group-flush border-top">
                    <div class="px-3 py-2 bg-light text-muted small fw-bold text-uppercase">Tiện ích Sinh viên</div>
                    <a href="/user/borrow-history" class="list-group-item list-group-item-action py-3">
                        <i class="bi bi-clock-history me-2 text-warning"></i> Lịch sử mượn sách
                    </a>
                    <a href="/profile" class="list-group-item list-group-item-action py-3">
                        <i class="bi bi-person-vcard me-2 text-primary"></i> Thông tin cá nhân
                    </a>
                </div>
            </div>

            <div class="p-3 mt-auto border-top text-center text-muted small">
                Thư viện Ngũ Quỷ v1.0 - HUTECH
            </div>
        </div>
    </div>

    <!-- Shared Styles for Header and Sidebar -->
    <style th:fragment="headerStyles">
        .reader-card-sidebar { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 15px;
        }
        .offcanvas-body::-webkit-scrollbar { width: 5px; }
        .offcanvas-body::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 10px; }
    </style>
</body>
</html>
