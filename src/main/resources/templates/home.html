<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Thư viện Ngũ Quỷ - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .book-card { transition: transform 0.2s; }
        .book-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <button class="btn btn-primary me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#adminSidebar" sec:authorize="hasRole('ADMIN')">
                <span class="navbar-toggler-icon"></span>
            </button>

            <a class="navbar-brand fw-bold" href="/">NGU QUY LIBRARY</a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle text-white" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            Chào, <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="dropdown-item text-danger">Đăng xuất</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="adminSidebar" aria-labelledby="adminSidebarLabel">
        <div class="offcanvas-header bg-primary text-white">
            <h5 class="offcanvas-title" id="adminSidebarLabel">Bảng Quản Lý</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="list-group list-group-flush">
                <a th:href="@{/admin/add-book}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-book me-2"></i> Quản lý sách
                </a>
                <a th:href="@{/admin/borrow-management}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-journal-check me-2"></i> Quản lý mượn sách
                </a>
                <a th:href="@{/admin/users}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-people me-2"></i> Quản lý thành viên
                </a>
                <hr>
                <p class="text-muted small px-3">Thư viện Ngũ Quỷ v1.0</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row" id="book-container">
            </div>

        <div id="loader" class="text-center my-4" style="display: none;">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Đang tải thêm sách...</p>
        </div>
    </div>

    <script>
        let currentPage = 0;
        let isLoading = false;
        let isLastPage = false;

        const bookContainer = document.getElementById('book-container');
        const loader = document.getElementById('loader');

        // Hàm gọi API lấy sách
        async function loadBooks() {
            if (isLoading || isLastPage) return;
            
            isLoading = true;
            loader.style.display = 'block';

            try {
                const response = await fetch(`/api/books?page=${currentPage}`);
                const data = await response.json();
                
                if (data.content.length > 0) {
                    data.content.forEach(book => {
                        const card = `
                            <div class="col-md-3 mb-4">
                                <div class="card h-100 shadow-sm book-card">
                                    <div class="card-body">
                                        <h5 class="card-title text-primary">${book.title}</h5>
                                        <p class="card-text">Tác giả: <strong>${book.author}</strong></p>
                                        <p class="card-text"><small class="text-muted">Thể loại: ${book.category}</small></p>
                                        <img src="${book.imageUrl || 'https://via.placeholder.com/150'}"
                                    </div>
                                    <div class="card-footer bg-white border-top-0">
                                        <span class="badge bg-info">Còn lại: ${book.quantity}</span>
                                        <button class="btn btn-sm btn-outline-primary float-end">Mượn sách</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        bookContainer.innerHTML += card;
                    });
                    currentPage++;
                    isLastPage = data.last; // Kiểm tra xem đã là trang cuối chưa
                }
            } catch (error) {
                console.error("Lỗi tải sách:", error);
            } finally {
                isLoading = false;
                loader.style.display = 'none';
            }
        }

        // Kỹ thuật Intersection Observer: Tự động gọi hàm khi cuộn tới Loader
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadBooks();
            }
        }, { threshold: 1.0 });

        observer.observe(loader);

        // Tải trang đầu tiên
        loadBooks();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
