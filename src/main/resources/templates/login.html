<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Ngu Quy Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-login { border-radius: 10px; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">ĐĂNG NHẬP</h2>
                        <p class="text-muted small">Hệ thống Quản lý Thư viện Ngũ Quỷ</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger small py-2">
                        Sai MSSV hoặc mật khẩu. Vui lòng thử lại!
                    </div>
                    
                    <div th:if="${param.registered}" class="alert alert-success small py-2">
                        Đăng ký thành công! Mời bạn đăng nhập.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Mã số sinh viên (MSSV)</label>
                            <input type="text" name="mssv" class="form-control form-control-lg" 
                                   placeholder="Nhập MSSV" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Mật khẩu</label>
                            <input type="password" name="password" class="form-control form-control-lg" 
                                   placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-login w-100 mb-3 shadow-sm">
                            ĐĂNG NHẬP NGAY
                        </button>
                    </form>

                    <div class="text-center mt-2">
                        <span class="text-muted small">Chưa có tài khoản độc giả? </span>
                        <a th:href="@{/register}" class="text-decoration-none small fw-bold">Đăng ký tại đây</a>
                    </div>
                </div>
                <p class="text-center text-muted mt-4 small">© 2026 HUTECH - Software Engineering</p>
            </div>
        </div>
    </div>
</body>
</html>
