<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký độc giả - Ngu Quy Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #e9ecef; min-height: 100vh; display: flex; align-items: center; padding: 40px 0; }
        .reg-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .form-control { border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card reg-card p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-success">ĐĂNG KÝ ĐỘC GIẢ</h3>
                        <p class="text-muted small">Tạo tài khoản để nhận Thẻ thư viện tự động</p>
                    </div>

                    <form th:action="@{/register}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Mã số sinh viên (MSSV)</label>
                            <input type="text" th:field="*{mssv}" class="form-control" 
                                   placeholder="Ví dụ: 2108110123" required>
                            <div class="form-text small">MSSV sẽ được dùng làm ID đăng nhập và tạo mã thẻ.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Họ và tên đầy đủ</label>
                            <input type="text" th:field="*{fullName}" class="form-control" 
                                   placeholder="Nhập tên tiếng Việt có dấu" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Địa chỉ Email</label>
                            <input type="email" th:field="*{email}" class="form-control" 
                                   placeholder="sinhvien@hutech.edu.vn" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" 
                                   placeholder="Tối thiểu 6 ký tự" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success p-2 fw-bold shadow-sm">
                                XÁC NHẬN ĐĂNG KÝ
                            </button>
                            <a th:href="@{/login}" class="btn btn-light p-2 small">Quay lại Đăng nhập</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
