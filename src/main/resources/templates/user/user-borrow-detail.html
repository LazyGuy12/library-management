<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Giao Dịch Mượn Sách - Ngu Quy Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .reader-card-library {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 15px;
        }
        .reader-library-body {
            padding: 30px;
        }
        .card-header-text {
            text-transform: uppercase;
            font-size: 0.75rem;
            opacity: 0.8;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .reader-card-id-box {
            background-color: rgba(255, 255, 255, 0.25);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
        }
        .reader-card-id-label {
            opacity: 0.75;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 5px;
        }
        .reader-card-id-value {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .reader-card-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .reader-card-status {
            text-align: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }
        .info-label {
            font-weight: 600;
            color: #6c757d;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: #212529;
            margin-bottom: 15px;
        }
        .reader-card-sidebar { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 15px;
        }
        .offcanvas-body::-webkit-scrollbar { width: 5px; }
        .offcanvas-body::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 10px; }
    </style>
</head>
<body class="bg-light">
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm" th:replace="~{fragments/header :: navbar}"></nav>
    
    <!-- Sidebar -->
    <div th:replace="~{fragments/header :: sidebar}"></div>
    
    <div class="container mt-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">
                <i class="bi bi-file-earmark-text me-2"></i>Chi Tiết Giao Dịch Mượn Sách
            </h2>
            <a href="/user/borrow-history" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-1"></i>Quay Lại Lịch Sử
            </a>
        </div>

        <div th:if="${loanDetail}" class="row">
            <!-- Thẻ Độc Giả Section - Library Card Style -->
            <div class="col-md-6 mb-4">
                <div class="card reader-card-library shadow-sm">
                    <div class="reader-library-body">
                        <!-- Card Header -->
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <span class="card-header-text d-block">Library Card</span>
                                <h5 class="fw-bold mb-0" th:text="${user.fullName}">READER NAME</h5>
                            </div>
                            <i class="bi bi-qr-code fs-2"></i>
                        </div>
                        
                        <!-- Card ID Box -->
                        <div class="reader-card-id-box">
                            <span class="reader-card-id-label">CARD ID</span>
                            <div class="reader-card-id-value" th:text="${user.idCard}">LIB-XXXX</div>
                        </div>
                        
                        <!-- MSSV and Expiry Date -->
                        <div class="reader-card-footer">
                            <div>
                                <span class="d-block" style="opacity: 0.75; font-size: 0.75rem;">MSSV</span>
                                <span class="fw-bold" th:text="${loanDetail.readerMssv}">210XXXXXX</span>
                            </div>
                            <div class="text-end">
                                <span class="d-block" style="opacity: 0.75; font-size: 0.75rem;">HẠN DÙNG</span>
                                <span class="fw-bold" th:text="${#temporals.format(loanDetail.readerExpiryDate, 'yyyy-MM-dd')}">2027-04-01</span>
                            </div>
                        </div>
                        
                        <!-- Status -->
                        <div class="reader-card-status">
                            <span th:if="${loanDetail.readerStatus == 'ACTIVE'}" class="text-info">
                                ● Đang hoạt động
                            </span>
                            <span th:if="${loanDetail.readerStatus != 'ACTIVE'}" class="text-danger">
                                ● Bị khóa
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Thông Tin Sách Section -->
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-book me-2"></i>Thông Tin Sách
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="info-label">Tên Sách</label>
                            <div class="info-value">
                                <span th:text="${loanDetail.bookTitle}"></span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="info-label">Tác Giả</label>
                            <div class="info-value">
                                <span th:text="${loanDetail.bookAuthor}"></span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="info-label">Mã Sách (ISBN)</label>
                            <div class="info-value">
                                <code th:text="${loanDetail.bookCode}"></code>
                            </div>
                        </div>
                        <div class="mb-0">
                            <label class="info-label">Số Lượng Mượn</label>
                            <div class="info-value">
                                <span class="badge bg-info p-2" th:text="${loanDetail.quantity} + ' cuốn'">1 cuốn</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Thông Tin Mượn Section -->
            <div class="col-12 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-calendar3 me-2"></i>Thông Tin Mượn
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label class="info-label">Ngày Mượn</label>
                                <div class="info-value">
                                    <i class="bi bi-calendar me-1"></i>
                                    <span th:text="${#temporals.format(loanDetail.borrowDate, 'dd/MM/yyyy')}"></span>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="info-label">Hạn Trả</label>
                                <div class="info-value">
                                    <i class="bi bi-calendar-check me-1"></i>
                                    <span th:text="${#temporals.format(loanDetail.dueDate, 'dd/MM/yyyy')}"></span>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="info-label">Ngày Trả Thực Tế</label>
                                <div class="info-value">
                                    <span th:if="${loanDetail.returnDate != null}">
                                        <i class="bi bi-check-circle me-1 text-success"></i>
                                        <span th:text="${#temporals.format(loanDetail.returnDate, 'dd/MM/yyyy')}"></span>
                                    </span>
                                    <span th:if="${loanDetail.returnDate == null}" class="text-muted">
                                        <i class="bi bi-hourglass-split me-1"></i>Chưa Trả
                                    </span>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="info-label">Trạng Thái</label>
                                <div class="info-value">
                                    <span th:if="${loanDetail.status == 'ACTIVE'}" class="badge bg-warning text-dark" style="font-size: 0.95rem; padding: 6px 12px;">
                                        <i class="bi bi-hourglass-top me-1"></i>Đang Mượn
                                    </span>
                                    <span th:if="${loanDetail.status == 'RETURNED'}" class="badge bg-success" style="font-size: 0.95rem; padding: 6px 12px;">
                                        <i class="bi bi-check-circle me-1"></i>Đã Trả
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tiền Phạt Section -->
            <div class="col-12 mb-4">
                <div class="card shadow-sm border-0" th:classappend="${loanDetail.lateFee > 0 ? 'border-danger' : ''}">
                    <div class="card-header" th:classappend="${loanDetail.lateFee > 0 ? 'bg-danger text-white' : 'bg-success text-white'}">
                        <h5 class="mb-0">
                            <i class="bi bi-cash-coin me-2"></i>Tiền Phạt Quá Hạn
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="info-value">
                            <span th:if="${loanDetail.lateFee > 0}" class="text-danger">
                                <strong th:text="${loanDetail.lateFee} + ' đ'"></strong>
                            </span>
                            <span th:if="${loanDetail.lateFee == 0}" class="text-success">
                                <i class="bi bi-check-circle me-1"></i>Không có tiền phạt
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="col-12 mb-4">
                <div class="d-flex gap-2">
                    <a href="/user/borrow-history" class="btn btn-primary btn-lg">
                        <i class="bi bi-list me-2"></i>Xem Danh Sách
                    </a>
                    <a href="/" class="btn btn-secondary btn-lg">
                        <i class="bi bi-house me-2"></i>Trang Chủ
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
